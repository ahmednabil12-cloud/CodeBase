<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | CodeBase</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
  </head>
  <body>
    <nav>
      <a class="h1" href="index.html"><samp>C</samp>ode<samp>B</samp>ase</a>
      <div class="maun">
        <a href="courses.html">Courses</a>
        <a href="index.html#about-section">About</a>
        <a href="index.html#Contact-section">Contact</a>
      </div>
      <div class="bot-regester">
        <a href="regester.html" class="regester">Register</a>
      </div>
    </nav>

    <div class="body-content">
      <div class="container">
        <input type="checkbox" id="toggle-state" style="display: none" />

        <div class="form-box login">
          <form action="#">
            <h1>Login</h1>
            <div class="input-box">
              <input type="text" placeholder="Username" required />
              <i class="fa-solid fa-user"></i>
            </div>
            <div class="input-box">
              <input type="password" placeholder="Password" required />
              <i class="fa-solid fa-lock"></i>
            </div>
            <div class="forgot-link">
              <a href="#">Forgot Password?</a>
            </div>
            <button type="submit" class="btn">Login</button>
          </form>
        </div>

        <div class="form-box register">
          <form action="#">
            <h1>Register</h1>
            <div class="input-box">
              <input type="text" placeholder="Username" required />
              <i class="fa-solid fa-user"></i>
            </div>
            <div class="input-box">
              <input type="email" placeholder="Email" required />
              <i class="fa-solid fa-envelope"></i>
            </div>
            <div class="input-box">
              <input type="password" placeholder="Password" required />
              <i class="fa-solid fa-lock"></i>
            </div>
            <button type="submit" class="btn">Register</button>
          </form>
        </div>

        <div class="toggle-box">
          <div class="toggle-panel toggle-left">
            <h1>Hello, Welcome!</h1>
            <p>Don't have an account?</p>
            <label for="toggle-state" class="btn register-btn">Register</label>
          </div>
          <div class="toggle-panel toggle-right">
            <h1>Welcome Back!</h1>
            <p>Already have an account?</p>
            <label for="toggle-state" class="btn login-btn">Login</label>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
